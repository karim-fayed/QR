<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generator for Excel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="qr-code-container" class="container">
    <h1 class="title">QR Generator for Excel</h1>
    <div class="qr-container">
      <div id="qr-code" class="qr-code"></div>
      <div id="item-name" class="item-name"></div>
    </div>
    <label for="excel-file">Choose Excel File:</label>
    <input type="file" id="excel-file" accept=".xlsx">
    <button id="generate-btn" class="btn">Generate QR Code</button>
    <button id="print-btn" class="btn">Print QR Code</button>
    <button id="save-btn" class="btn">Save QR Code</button>
  </div>

  <!-- Include HTML5 QR Code library -->
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
