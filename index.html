<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Scanner</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <h1 class="title">QR Code Scanner</h1>
    <div class="qr-container" id="camera-container" style="display: none;">
      <div id="reader" style="width: 300px; height: 300px;"></div>
      <button id="close-camera-btn" class="btn" style="display: none;">Close Camera</button>
    </div>
    <button id="open-camera-btn" class="btn">Open Camera</button>
    <input type="file" id="excel-file" class="input">
    <button id="generate-btn" class="btn">Generate QR Codes</button>
    <button id="print-btn" class="btn">Print QR Codes</button>
    <button id="save-btn" class="btn">Save QR Codes</button>
    <div id="qr-code" class="qr-container"></div>
    <div id="item-name" class="item-name"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
